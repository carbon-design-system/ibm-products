# Deploy staging storybook environment from release branch to Github Pages
name: Deploy staging storybook

# Gets triggered every time a release candidate has been published from the `release-base` workflow
# or can be manually triggered
on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-staging-storybook]

jobs:
  build-react:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: '0'
          ref: ${{ github.event.client_payload.branch }}

      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-deploy-deps-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deploy-deps-
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Build packages
        run: yarn build:packages

      - name: Build React Storybook
        run: yarn storybook:build

      - name: Upload React Storybook artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: react-storybook-static
          path: packages/ibm-products/storybook-static
          retention-days: 1

  build-web-components:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: '0'
          ref: ${{ github.event.client_payload.branch }}

      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-deploy-deps-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deploy-deps-
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Build packages
        run: yarn build:packages

      - name: Build Web Components Storybook
        run: |
          cd packages/ibm-products-web-components
          yarn build:storybook --loglevel info

      - name: Upload Web Components Storybook artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: web-components-storybook-static
          path: packages/ibm-products-web-components/storybook-static
          retention-days: 1

  deploy-staging-storybook:
    needs: [build-react, build-web-components]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: '0'
          ref: ${{ github.event.client_payload.branch }}

      - name: Download React Storybook artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: react-storybook-static
          path: staging-dist/react

      - name: Download Web Components Storybook artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: web-components-storybook-static
          path: staging-dist/web-components

      - name: Set authenticated Git remote
        run:
          git remote set-url origin https://git:${{ secrets.GITHUB_TOKEN
          }}@github.com/${{ github.repository }}.git

      - name: Deploy both Storybooks to GitHub Pages (gh-pages/staging)
        run: |
          npx gh-pages -d staging-dist \
            -u "github-actions-bot <support+actions@github.com>" \
            --dest staging \
            --message "chore(deploy): deploy React and Web Components Storybooks to staging"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
