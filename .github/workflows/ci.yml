name: CI # Run CI Checks

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main
      - v1
      - 'release\/v2**'
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Shared setup job that installs dependencies once
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Cache node_modules
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Restore node_modules
        id: cache-deps
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies (fallback)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: yarn install --immutable
      - name: Build packages and storybook
        run: yarn build
      - name: Upload build artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: build-artifacts
          path: |
            packages/*/lib
            packages/*/dist
            packages/*/es
            packages/*/storybook-static
          retention-days: 1

  format:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Restore node_modules
        id: cache-deps
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies (fallback)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: yarn install --immutable
      - name: Check formatting of project files
        run: yarn format:diff

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Restore node_modules
        id: cache-deps
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies (fallback)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: yarn install --immutable
      - name: CI lint checks
        run: yarn ci-check:lint

  spellcheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Restore node_modules
        id: cache-deps
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies (fallback)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: yarn install --immutable
      - name: CI spellcheck checks
        run: yarn ci-check:spellcheck

  test-c4p:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Restore node_modules
        id: cache-deps
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies (fallback)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: yarn install --immutable
      - name: CI snapshot tests for c4p
        run: yarn ci-check:test:c4p:snapshot
      - name: CI tests for c4p
        run: yarn ci-check:test:c4p --collectCoverage
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-c4p-wc:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Restore node_modules
        id: cache-deps
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies (fallback)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: yarn install --immutable
      - name: Install browsers
        working-directory: packages/ibm-products-web-components
        run: yarn playwright install --with-deps
      - name: Build web-components project
        run: yarn ci-check:test:c4p-wc:build
      - name: CI tests for products web components
        run: yarn ci-check:test:c4p-wc --coverage
      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  avt-runner:
    needs: build
    strategy:
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Restore node_modules
        id: cache-deps
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies (fallback)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: yarn install --immutable

      # Download build artifacts with fallback
      - name: Download build artifacts
        id: build-artifacts
        continue-on-error: true
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: build-artifacts
          path: packages

      # Fallback: rebuild if artifacts are not available (e.g., expired after 1 day)
      - name: Build project (fallback)
        if: steps.build-artifacts.outcome == 'failure'
        run: yarn build

      - name: Install browsers
        run: yarn playwright install --with-deps

      - name: Run storybook
        id: storybook
        run: |
          npx serve -l 3000 packages/ibm-products/storybook-static &
          pid=$!
          echo "pid=$pid" >> $GITHUB_OUTPUT
      - uses: ./actions/wait-for-it
        with:
          URL: 'http://localhost:3000'
        timeout-minutes: 3

      - name: Run AVT
        if: github.repository == 'carbon-design-system/ibm-products'
        run: |
          yarn playwright test --project chromium --grep @avt --shard="${{ matrix.shardIndex }}/${{ matrix.shardTotal }}"
      - name: Stop storybook
        run: kill ${{ steps.storybook.outputs.pid }}

      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

  avt:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: avt-runner
    steps:
      - name: Check AVT Runner job status
        if: ${{ needs.avt-runner.result != 'success' }}
        run: exit 1

  merge-reports:
    # Merge reports after playwright-tests, even if some shards have failed
    if:
      ${{ github.repository == 'carbon-design-system/ibm-products' &&
      !cancelled() && github.event.pull_request.draft == false }}
    needs: avt-runner

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 14

  chromatic-ibm-products:
    needs: setup
    if:
      ${{ github.repository == 'carbon-design-system/ibm-products' &&
      github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    outputs:
      buildUrl: ${{ steps.chromatic.outputs.buildUrl }}
      storybookUrl: ${{ steps.chromatic.outputs.storybookUrl }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # 👇 Tells the checkout which commit hash to reference
          # https://www.chromatic.com/docs/github-actions/#recommended-configuration-for-build-events
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Restore node_modules
        id: cache-deps
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies (fallback)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: yarn install --immutable
      - id: chromatic
        name: Run Chromatic
        uses: chromaui/action@eea1606238fd97a70b5af723d103953d1f40967b # v15.3.1
        with:
          # 👇 Token is intentionally plaintext
          # https://www.chromatic.com/docs/github-actions/#run-chromatic-on-external-forks-of-open-source-projects
          projectToken: chpt_c0476f97d5200bd
          workingDir: packages/ibm-products
          buildScriptName: storybook:build
          zip: true # Compress build output for faster uploads
          autoAcceptChanges: 'main' # Auto-accept changes on main branch
          onlyChanged: true # Enable TurboSnap to only test changed stories
          # Track changes in source files and styles
          externals: |
            packages/ibm-products/src/**
            packages/ibm-products-styles/**
          # Ignore theme.js changes to reduce false positives
          untraced: |
            packages/ibm-products/.storybook/theme.js
        env:
          # 👇 Set to the PR branch if it's a PR; otherwise, falls back to the pushed branch name
          CHROMATIC_BRANCH:
            ${{ github.event.pull_request.head.ref || github.ref_name }}
          # 👇 Set to the PR head commit if it's a PR; otherwise to the ref
          CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.ref }}
          # 👇 Makes sure this is always set to the correct owner/repo
          CHROMATIC_SLUG: ${{ github.repository }}

  # This takes the chromatic storybook url and pipes it into a github deployment
  # environment so that PRs will have the deploy preview listed in both the
  # PR timeline and the 'branch deployment' section at the bottom above the
  # status checks. This avoids noisy/large comments for deploy previews.
  ibm-products-storybook-preview:
    runs-on: ubuntu-latest
    needs: chromatic-ibm-products
    steps:
      - name: Generate job summary
        env:
          buildUrl: ${{ needs.chromatic-ibm-products.outputs.buildUrl }}
          storybookUrl: ${{ needs.chromatic-ibm-products.outputs.storybookUrl }}
        run: |
          echo "### @carbon/ibm-products storybook deploy preview :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY # this is a blank line
          echo "- Storybook deploy preview: ${{ env.storybookUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.event.pull_request.head.sha }}" >> $GITHUB_STEP_SUMMARY

  chromatic-ibm-products-web-components:
    needs: setup
    if:
      github.event_name == 'pull_request' && github.event.pull_request.draft ==
      false
    runs-on: ubuntu-latest
    outputs:
      buildUrl: ${{ steps.chromatic.outputs.buildUrl }}
      storybookUrl: ${{ steps.chromatic.outputs.storybookUrl }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # https://www.chromatic.com/docs/github-actions/#recommended-configuration-for-build-events
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Restore node_modules
        id: cache-deps
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            */**/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies (fallback)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: yarn install --immutable
      - name: Build web components and dependencies
        run:
          lerna run build --scope @carbon/ibm-products-web-components
          --include-dependencies --stream
      - id: chromatic
        name: Run Chromatic
        uses: chromaui/action@eea1606238fd97a70b5af723d103953d1f40967b # v15.3.1
        with:
          # 👇 Token is intentionally plaintext
          # https://www.chromatic.com/docs/github-actions/#run-chromatic-on-external-forks-of-open-source-projects
          projectToken: chpt_585c8a948a7079f
          workingDir: packages/ibm-products-web-components
          buildScriptName: build:storybook
          zip: true # Compress build output for faster uploads
          autoAcceptChanges: 'main' # Auto-accept changes on main branch
          onlyChanged: true # Enable TurboSnap to only test changed stories
          # Track changes in web components source files
          externals: |
            packages/ibm-products-web-components/src/**
        env:
          # 👇 Set to the PR branch if it's a PR; otherwise, falls back to the pushed branch name
          CHROMATIC_BRANCH:
            ${{ github.event.pull_request.head.ref || github.ref_name }}
          CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.ref }}
          CHROMATIC_SLUG: ${{ github.repository }}

  # This takes the chromatic storybook url and pipes it into a github deployment
  # environment so that PRs will have the deploy preview listed in both the
  # PR timeline and the 'branch deployment' section at the bottom above the
  # status checks. This avoids noisy/large comments for deploy previews.
  ibm-products-web-components-storybook-preview:
    runs-on: ubuntu-latest
    needs: chromatic-ibm-products-web-components
    steps:
      - name: Generate job summary
        env:
          buildUrl:
            ${{ needs.chromatic-ibm-products-web-components.outputs.buildUrl }}
          storybookUrl:
            ${{ needs.chromatic-ibm-products-web-components.outputs.storybookUrl
            }}
        run: |
          echo "### @carbon/ibm-products-web-components storybook deploy preview :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY # this is a blank line
          echo "- Storybook deploy preview: ${{ env.storybookUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.event.pull_request.head.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Chromatic build URL: ${{ env.buildUrl }}" >> $GITHUB_STEP_SUMMARY

  flag-agents-md-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Detect AGENTS.md changes
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            added_or_modified:
              - added|modified: '**/AGENTS.md'
      - name: Post PR comment (if not already present)
        if: steps.changes.outputs.added_or_modified == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const marker = "<!-- agents-md-comment -->";
            const body = `${marker}
            ⚠️ An AGENTS.md was added or updated in this PR. The length of these files directly correlate with token usage, increased instruction length, and spend. Please follow [best practices](https://www.aihero.dev/a-complete-guide-to-agents-md) and leave a comment explaining why this change is needed.
            `.replace(/\n[ \t]+/g, '\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const alreadyCommented = comments.some(comment =>
              comment.body?.includes(marker)
            );

            if (!alreadyCommented) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
