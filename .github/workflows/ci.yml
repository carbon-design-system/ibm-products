name: CI # Run CI Checks

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main
      - v1
      - 'release\/v2**'
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: CI build checks
        run: yarn ci-check:build

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Check formatting of project files
        run: yarn format:diff

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: CI lint checks
        run: yarn ci-check:lint

  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: CI spellcheck checks
        run: yarn ci-check:spellcheck

  test-c4p:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: CI snapshot tests for c4p
        run: yarn ci-check:test:c4p:snapshot
      - name: CI tests for c4p
        run: yarn ci-check:test:c4p --collectCoverage
      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-c4p-wc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Install browsers
        working-directory: packages/ibm-products-web-components
        run: yarn playwright install --with-deps
      - name: Build web-components project
        run: yarn ci-check:test:c4p-wc:build
      - name: CI tests for products web components
        run: yarn ci-check:test:c4p-wc --coverage
      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  avt-runner:
    strategy:
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable

      - name: Detect changed components
        id: detect-changes
        run: |
          BASE_REF="${{ github.base_ref }}"
          echo "Base branch: $BASE_REF"

          # Check if this is a release branch (v1, release/v2*, etc.)
          if [[ "$BASE_REF" == "v1" ]] || [[ "$BASE_REF" == release/* ]]; then
            echo "🚀 Release branch detected: $BASE_REF"
            echo "Running all AVT tests for release validation."
            echo "skip_avt=false" >> $GITHUB_OUTPUT
            echo "run_selective=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # For non-release branches (main), detect changed components
          echo "📝 Regular PR to $BASE_REF - detecting changed components..."

          # Get changed files in the PR
          CHANGED_FILES=$(git diff --name-only origin/$BASE_REF...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Extract unique component names from changed files
          COMPONENTS=$(echo "$CHANGED_FILES" | grep -E '^packages/ibm-products/src/components/[^/]+/' | sed -E 's|^packages/ibm-products/src/components/([^/]+)/.*|\1|' | sort -u)

          if [ -z "$COMPONENTS" ]; then
            echo "No component changes detected. Skipping AVT tests."
            echo "skip_avt=true" >> $GITHUB_OUTPUT
            echo "run_selective=false" >> $GITHUB_OUTPUT
          else
            echo "Changed components:"
            echo "$COMPONENTS"
            
            # Build test pattern for changed components that have AVT tests
            PATTERN_PARTS=""
            for component in $COMPONENTS; do
              TEST_FILE="e2e/components/$component/${component}-test.avt.e2e.js"
              if [ -f "$TEST_FILE" ]; then
                if [ -z "$PATTERN_PARTS" ]; then
                  PATTERN_PARTS="$component"
                else
                  PATTERN_PARTS="$PATTERN_PARTS|$component"
                fi
                echo "  ✓ $component (has AVT tests)"
              else
                echo "  ✗ $component (no AVT tests)"
              fi
            done
            
            if [ -z "$PATTERN_PARTS" ]; then
              echo "No AVT tests found for changed components. Skipping AVT tests."
              echo "skip_avt=true" >> $GITHUB_OUTPUT
              echo "run_selective=false" >> $GITHUB_OUTPUT
            else
              TEST_PATTERN="e2e/components/($PATTERN_PARTS)/.*-test\\.avt\\.e2e\\.js"
              echo "Test pattern: $TEST_PATTERN"
              echo "test_pattern=$TEST_PATTERN" >> $GITHUB_OUTPUT
              echo "skip_avt=false" >> $GITHUB_OUTPUT
              echo "run_selective=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Install browsers
        if: steps.detect-changes.outputs.skip_avt != 'true'
        run: yarn playwright install --with-deps

      - name: Build project
        if: steps.detect-changes.outputs.skip_avt != 'true'
        run: yarn build

      - name: Run storybook
        if: steps.detect-changes.outputs.skip_avt != 'true'
        id: storybook
        run: |
          npx serve -l 3000 packages/ibm-products/storybook-static &
          pid=$!
          echo "pid=$pid" >> $GITHUB_OUTPUT
      - uses: ./actions/wait-for-it
        if: steps.detect-changes.outputs.skip_avt != 'true'
        with:
          URL: 'http://localhost:3000'
        timeout-minutes: 3

      - name: Run AVT
        if:
          github.repository == 'carbon-design-system/ibm-products' &&
          steps.detect-changes.outputs.skip_avt != 'true'
        run: |
          if [ "${{ steps.detect-changes.outputs.run_selective }}" == "true" ]; then
            echo "Running selective AVT tests for changed components..."
            yarn playwright test --project chromium --grep @avt "${{ steps.detect-changes.outputs.test_pattern }}" --shard="${{ matrix.shardIndex }}/${{ matrix.shardTotal }}"
          else
            echo "Running all AVT tests..."
            yarn playwright test --project chromium --grep @avt --shard="${{ matrix.shardIndex }}/${{ matrix.shardTotal }}"
          fi
      - name: Stop storybook
        if:
          steps.detect-changes.outputs.skip_avt != 'true' &&
          steps.storybook.outputs.pid != ''
        run: kill ${{ steps.storybook.outputs.pid }}

      - name: Upload blob report to GitHub Actions Artifacts
        if:
          ${{ !cancelled() && steps.detect-changes.outputs.skip_avt != 'true' }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

  avt:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: avt-runner
    steps:
      - name: Check AVT Runner job status
        if: ${{ needs.avt-runner.result != 'success' }}
        run: exit 1

  merge-reports:
    # Merge reports after playwright-tests, even if some shards have failed
    if:
      ${{ github.repository == 'carbon-design-system/ibm-products' &&
      !cancelled() && github.event.pull_request.draft == false }}
    needs: avt-runner

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 14

  vrt-runner:
    runs-on: ubuntu-latest
    if:
      ${{ github.repository == 'carbon-design-system/ibm-products' &&
      github.event.pull_request.draft == false }}
    env:
      PERCY_TOKEN: web_d04495b0b413d61c2ea6b9118d1748b43f4fdd58d17ebe453ef8e0016b5766e4
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Install browsers
        run: yarn playwright install --with-deps
      - name: Build project
        run: yarn build
      - name: Run VRT
        if:
          ${{ env.PERCY_TOKEN != '' && github.repository ==
          'carbon-design-system/ibm-products' && github.event.pull_request.draft
          == false }}
        working-directory: packages/ibm-products
        run: yarn percy storybook storybook-static
